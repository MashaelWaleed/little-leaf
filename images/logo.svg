<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&amp;display=swap');
      
      .brand-text {
        font-family: 'Playfair Display', serif;
        font-size: 32px;
        font-weight: 700;
        fill: #5B6B40; /* Olive green matching the website */
        letter-spacing: 0.5px;
      }
      .leaf-icon {
        fill: #5B6B40;
      }
      .stem {
        stroke: #5B6B40;
        stroke-width: 3;
        stroke-linecap: round;
        fill: none;
      }
    </style>
  </defs>
  
  <g transform="translate(20, -1)">
    <path class="stem" d="M20,45 Q15,55 12,60" />
    <path class="leaf-icon" d="M20,45 C20,20 45,15 45,15 C45,15 40,40 20,45 Z" />
    <path class="leaf-icon" d="M20,45 C10,35 5,20 5,20 C5,20 20,25 20,45 Z" opacity="0.75" />
  </g>
  
  <text x="85" y="52" class="brand-text">Little Leaf</text>
</svg>